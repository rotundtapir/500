# Build performance
org.gradle.jvmargs=-Xmx2560m -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=false

# App version — single source of truth for the Android versionName/versionCode and the version the
# web build bakes in and every client reports to the online server on connect.
appVersionName=0.3.0
appVersionCode=3

# Kotlin
kotlin.code.style=official

# Android
android.useAndroidX=true
android.nonTransitiveRClass=true

# Use a locally-installed JDK 21 toolchain; do not silently download JDKs.
# Run Gradle itself on JDK 21 (AGP does not support running on JDK 25+).
org.gradle.java.installations.auto-download=false
