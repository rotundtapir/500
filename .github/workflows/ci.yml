name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # pulls in the cardkit submodule

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Static analysis (detekt + CPD)
        run: ./gradlew qualityCheck

      - name: Unit tests (engine + ai + net + server + shared) and lint
        run: ./gradlew :engine:jvmTest :ai:jvmTest :net:jvmTest :server:test :shared:testDebugUnitTest lint

      - name: Coverage verification (engine + ai + net + server)
        run: ./gradlew :engine:koverVerify :ai:koverVerify :net:koverVerify :server:koverVerify

      - name: Assemble both flavors (debug)
        run: ./gradlew assembleFossDebug assemblePlayDebug

      - name: Build web distribution (wasmJs)
        run: ./gradlew :web:wasmJsBrowserDistribution

      # The online e2e spec boots a real game server; Playwright's webServer launches
      # server/build/install/server/bin/server, so that dist must exist before the e2e step.
      - name: Build server distribution (for online e2e)
        run: ./gradlew :server:installDist

      # E2E smoke of the production wasm artifact: served under a /500/ prefix (the Pages
      # subpath), driven with Playwright against the runner's Chrome (WasmGC-capable).
      - name: Web E2E (Playwright)
        working-directory: web/e2e
        run: |
          npm ci
          npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            web/e2e/playwright-report
            web/e2e/test-results
          if-no-files-found: ignore

      - name: Upload quality reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: |
            **/build/reports/detekt/
            **/build/reports/cpd/
          if-no-files-found: ignore

      - name: Verify FOSS build has no proprietary deps
        run: |
          ./gradlew :app:dependencies --configuration fossReleaseRuntimeClasspath > foss-deps.txt
          if grep -Eq 'com\.google\.android\.gms|com\.android\.billingclient|firebase|cardkit-monetization-play' foss-deps.txt; then
            echo "::error::FOSS build graph contains a proprietary dependency"; exit 1
          fi

  # On-device (emulator) integration suite — GameFlowTest, DeepLinkTest, OnlineFlowTest — so the
  # Android side gates merges like the web e2e does (issue #10). A dev-mode game server runs on the
  # runner (the emulator dials it at ws://10.0.2.2:8080) so OnlineFlowTest exercises the real
  # online stack; without it those tests would self-skip.
  android-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM for the emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build and start the game server (for OnlineFlowTest)
        run: |
          ./gradlew :server:installDist
          PORT=8080 DEV_MODE=true ALLOWED_ORIGINS='*' MIN_APP_VERSION=0.0.0 \
            nohup server/build/install/server/bin/server > server.log 2>&1 &
          for i in $(seq 1 30); do
            curl -fsS http://localhost:8080/health && break
            sleep 1
          done

      - name: Connected tests (emulator)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          # Phone-sized screen: the runner's default AVD is small enough that below-the-fold
          # content (settings-dialog rows, the lobby's Start button) fails assertIsDisplayed/click.
          profile: pixel_5
          emulator-options: -no-window -gpu swiftshader_indirect -no-audio -no-boot-anim -no-snapshot
          disable-animations: true
          script: ./gradlew :app:connectedFossDebugAndroidTest

      - name: Upload connected-test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: connected-test-reports
          path: |
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/
            server.log
          if-no-files-found: ignore

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create the GitHub release and upload the APK
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - uses: gradle/actions/setup-gradle@v4

      # Signing secrets (configure in repo settings):
      #   KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build release artifacts
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:bundlePlayRelease :app:assembleFossRelease

      - name: Publish GitHub release (FOSS APK)
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/foss/release/*.apk

      # The play AAB is for the Play Console, not for sideloading: expose it as a private
      # workflow artifact (Actions -> run -> Artifacts) rather than on the public release.
      - name: Upload play AAB as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: play-release-aab
          path: app/build/outputs/bundle/playRelease/*.aab
          if-no-files-found: error

  # Build the server image and push it to GHCR on a release tag. The jar is built with Gradle (cache
  # reuse) then copied into a thin image; multi-arch so self-hosters on ARM (Raspberry Pi) can pull.
  publish-server-image:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push to GHCR
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build server distribution
        run: ./gradlew :server:installDist
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/rotundtapir/500-server
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # Deploy to the VPS: drain first (so in-flight games finish), pin the new IMAGE_TAG, pull, and
  # bring up. Secrets: DEPLOY_SSH_KEY, DEPLOY_HOST (the IP), DEPLOY_PORT, DEPLOY_KNOWN_HOSTS.
  deploy-server:
    needs: publish-server-image
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # Two tags pushed close together must not interleave drain/pin/up on the same box.
    concurrency:
      group: deploy-server
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Set up SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
      - name: Sync deploy files
        run: |
          rsync -e "ssh -p ${{ secrets.DEPLOY_PORT }} -i ~/.ssh/id_ed25519" -av \
            server/deploy/docker-compose.yml server/deploy/Caddyfile \
            root@${{ secrets.DEPLOY_HOST }}:/opt/500-server/
      - name: Drain, pin version, and bring up
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ssh -p "${{ secrets.DEPLOY_PORT }}" -i ~/.ssh/id_ed25519 root@"${{ secrets.DEPLOY_HOST }}" bash -s <<EOF
          set -e
          cd /opt/500-server
          # If anything below fails, undrain the OLD container so the box keeps serving instead of
          # being stranded in drain mode (where every CreateLobby is refused but /health still 200s).
          trap 'docker exec 500-server wget -qO- --post-data="" http://localhost:8080/admin/undrain || true' ERR
          docker exec 500-server wget -qO- --post-data='' http://localhost:8080/admin/drain || true
          for i in \$(seq 1 30); do
            g=\$(docker exec 500-server wget -qO- http://localhost:8080/health 2>/dev/null | grep -o '"activeGames":[0-9]*' | grep -o '[0-9]*' || echo 0)
            [ "\$g" = "0" ] && break
            sleep 30
          done
          sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${VERSION}/" .env
          docker compose pull server
          docker compose up -d --wait
          # The Caddyfile is a read-only bind mount, so a content change doesn't recreate the caddy
          # container; reload it explicitly in case this deploy shipped Caddyfile changes.
          docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile || docker compose restart caddy
          EOF
      - name: Verify health through Caddy
        run: |
          for i in $(seq 1 12); do
            curl -fsS https://500.29022617.xyz/health && exit 0
            sleep 10
          done
          echo "::error::post-deploy health check failed; roll back by setting the previous IMAGE_TAG in /opt/500-server/.env"
          exit 1

  # The playable web build (Kotlin/Wasm) goes to GitHub Pages on the same v* tags as the
  # Android release, so the hosted game tracks releases rather than every push to main.
  # One-time repo setting: Settings -> Pages -> Source = "GitHub Actions".
  deploy-web:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      pages: write      # deploy to GitHub Pages
      id-token: write   # OIDC token for the pages deployment
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      # settings.gradle.kts configures the Android modules even for :web tasks.
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - uses: gradle/actions/setup-gradle@v4

      - name: Build web distribution
        run: ./gradlew :web:wasmJsBrowserDistribution

      # Actions-sourced Pages deployments skip Jekyll anyway; this is belt-and-braces in case
      # the Pages source is ever switched back to a branch.
      - name: Disable Jekyll
        run: touch web/build/dist/wasmJs/productionExecutable/.nojekyll

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/build/dist/wasmJs/productionExecutable
      - id: deployment
        uses: actions/deploy-pages@v4
