# fail2ban filter for the 500 game server's structured abuse log lines. The server logs one line per
# abuse event as `... ABUSE event=<kind> ip=<client-ip> detail=...`, where the client IP is the real
# origin (X-Forwarded-For, corrected by Caddy). Installed to /etc/fail2ban/filter.d/500-server.conf
# by bootstrap.sh; the jail (jail.d/500.local) reads the container's journald stream.
[Definition]
failregex = ^.*ABUSE event=\S+ ip=<HOST> .*$
ignoreregex =
